name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Inject Picker API key
        env:
          KEY: ${{ secrets.PICKER_API_KEY }}
        run: |
          if [ -n "$KEY" ]; then
            sed -i "s/__PICKER_API_KEY__/${KEY}/" js/04-drive.js
          fi
      - name: Stamp deployed version
        run: |
          printf '{"commit":"%s","builtAt":"%s"}\n' \
            "$(git rev-parse --short HEAD)" \
            "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > version.json
          # cache-bust assets + expose the version to the app (Settings footer)
          sed -i "s/__APPVER__/$(git rev-parse --short HEAD)/g" index.html
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
